version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  # v2 behavior: path relative to config file rather than working directory
  relative-path-mode: cfg

linters:
  # v2 Overhaul: Instead of 'disable-all: true', we explicitly declare our default base set.
  # Options can be: standard, all, none, or fast. 'none' gives us total control.
  default: none

  enable:
    # --- Core Correctness & Safety ---
    - govet         # Standard Go suspicious-construct checks
    - ineffassign   # Detects ineffectual assignments
    - staticcheck   # Critical suite of logic, safety, and performance checks (The "Clippy" core)
    - unused        # Finds unused constants, variables, functions, and types
    - errcheck      # Ensures errors are not silently ignored
    - errorlint     # Enforces modern error wrapping (%w) and checking
    - gosec         # Scans for security vulnerabilities (SQLi, weak crypto, etc.)
    - errchkjson    # Checks JSON encoding/decoding error handling and unsupported types
    - unconvert     # Finds unnecessary type conversions
    - wastedassign  # Finds assigned values that are never used

    # --- Concurrency & Memory Invariants ---
    - copyloopvar   # Standard v2 check for loop pointer variable bugs
    - bodyclose     # Ensures HTTP response bodies are explicitly closed
    - sqlclosecheck # Ensures SQL rows/statements are closed
    - rowserrcheck  # Ensures SQL rows errors are checked after iteration
    - contextcheck  # Verifies context inheritance is not broken across sub-calls
    - durationcheck # Catches nonsensical duration arithmetic

    # --- Style & Idiom ---
    - revive        # Strict style convention enforcer (camelCase, ID naming, etc.)
    - goconst       # Finds repeated strings that should be constants
    - nilerr        # Catches returning nil when an error occurred
    - nilnil        # Catches returning nil value with nil error
    - nilnesserr    # Catches err checks that return a different nil error
    - nolintlint    # Enforces valid, specific nolint directives
    - testifylint   # Catches common testify assertion mistakes
    - usetesting    # Uses modern testing helpers where available
    - makezero      # Finds suspicious make([]T, n) followed by append patterns

  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    goconst:
      ignore-tests: true
      min-len: 5
      min-occurrences: 5
    gosec:
      excludes:
        - G104   # unhandled errors — owned by errcheck, avoid double-report

  exclusions:
    # 'strict' matches files starting with standard "^// Code generated .* DO NOT EDIT.$"
    generated: strict
    warn-unused: true

    # --- Pre-existing debt baseline ---
    # All rules below are pre-existing findings across the codebase, quarantined
    # so the golangci-lint gate can be turned on immediately.  They are tracked
    # for burn-down in FOLLOW-golangci-burndown — the size of each excluded
    # pattern MUST be non-increasing over time.
    rules:
      # revive/unused-parameter: 1052 pre-existing instances of unused function
      # parameters throughout the codebase.  Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^unused-parameter:"

      # revive/exported: 735 pre-existing exported symbols without doc comments.
      # Many of these are intentional (self-documenting names, internal protocols).
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^exported:"

      # revive/redefines-builtin-id: 65 pre-existing shadowing of built-in
      # identifiers.  Each needs case-by-case review.  Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^redefines-builtin-id:"

      # revive/package-comments: 23 pre-existing packages without doc comments.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^package-comments:"

      # revive/dot-imports: 7 pre-existing dot imports that need review.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^dot-imports:"

      # revive/empty-block: 9 pre-existing empty blocks.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^empty-block:"

      # revive/receiver-naming: 5 pre-existing receiver naming issues.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^receiver-naming:"

      # revive/blank-imports: 5 pre-existing blank imports.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^blank-imports:"

      # revive/increment-decrement: 4 pre-existing ++/-- style issues.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^increment-decrement:"

      # revive/var-naming: 3 pre-existing variable naming issues.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^var-naming:"

      # revive/error-strings: 3 pre-existing error string conventions.
      # Burn-down tracked in FOLLOW.
      - linters: [revive]
        text: "^error-strings:"

      # revive/var-declaration: 1 pre-existing var declaration style.
      - linters: [revive]
        text: "^var-declaration:"

      # revive/unexported-return: 1 pre-existing unexported return type.
      - linters: [revive]
        text: "^unexported-return:"

      # goconst is configured via linters.settings.goconst (min-len=5,
      # min-occurrences=5, ignore-tests=true).

      # gosec does not apply to test fixtures (no attack surface).
      - linters: [gosec]
        path: _test\.go

      # errcheck findings are handled via linters.settings.errcheck below,
      # not via blanket exclusion.

      # unconvert on CGO / syscall-platform files: type identity is
      # platform/arch-dependent (C types; syscall.Statfs_t field widths differ
      # by GOOS/GOARCH).  unconvert evaluates only the host build and cannot
      # prove a conversion redundant across all target arches, so it is scoped
      # off these specific files.  Every other unconvert finding is fixed, not
      # suppressed.
      - linters: [unconvert]
        path: 'platform/linux/internal/display/display_cgo\.go'
      - linters: [unconvert]
        path: 'assets/android\.go'

      # errcheck: test setup code (os.WriteFile, os.MkdirAll, deferred Close)
      # intentionally skips error checks for brevity. Tracked as pre-existing.
      - linters: [errcheck]
        path: _test\.go

      # nolintlint: The //nolint:unused directives in the Android audio stub file
      # are intentionally placed on build-tag-guarded stubs.
      - linters: [nolintlint]
        path: 'platform/android/audio/aaudio_unavailable\.go'
        text: "^directive.*is unused for linter"

      # staticcheck: remaining pre-existing staticcheck findings that were
      # not auto-fixed (SA, S, ST, QF families).
      # Burn-down tracked in FOLLOW.
      - linters: [staticcheck]
        text: "^(QF100[1238]|QF1012|S100[259]|S1039|S1040|ST100[15]|ST1023|SA40(0[06]|17)|SA9003|SA1019):"


# In v2, code formatting tools are extracted out of the general execution line
# and placed into their own pipeline for performance and auto-fixing integration.
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'  # Forces modern Go 1.18+ 'any' keyword syntax

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
